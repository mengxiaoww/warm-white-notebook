<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>暖白记事本 - 管理后台（小程序版）</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f5;
      padding: 20px;
    }
    .login-container {
      max-width: 400px;
      margin: 100px auto;
      background: white;
      padding: 30px;
      border-radius: 8px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.1);
    }
    h2 {
      text-align: center;
      margin-bottom: 30px;
      color: #333;
    }
    .form-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      margin-bottom: 8px;
      color: #666;
    }
    input {
      width: 100%;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 14px;
    }
    button {
      width: 100%;
      padding: 12px;
      background: #409EFF;
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 16px;
      cursor: pointer;
    }
    button:hover {
      background: #66b1ff;
    }
    .error {
      color: #f56c6c;
      font-size: 14px;
      margin-top: 10px;
      text-align: center;
    }
    .success {
      color: #67c23a;
      font-size: 14px;
      margin-top: 10px;
      text-align: center;
    }
    .tip {
      text-align: center;
      color: #999;
      font-size: 12px;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <h2>暖白记事本 - 管理后台</h2>
    <form id="loginForm">
      <div class="form-group">
        <label>用户名</label>
        <input type="text" id="username" value="admin" placeholder="请输入用户名">
      </div>
      <div class="form-group">
        <label>密码</label>
        <input type="password" id="password" value="admin123" placeholder="请输入密码">
      </div>
      <button type="submit" id="loginBtn">登录</button>
      <div id="message"></div>
    </form>
    <div class="tip">
      请在微信开发者工具中打开此页面
    </div>
  </div>

  <script>
    // 检查是否在微信小程序环境
    if (typeof wx === 'undefined') {
      document.getElementById('message').innerHTML = '<div class="error">请在微信开发者工具中打开此页面</div>'
    }

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault()

      const username = document.getElementById('username').value
      const password = document.getElementById('password').value
      const btn = document.getElementById('loginBtn')
      const message = document.getElementById('message')

      btn.disabled = true
      btn.textContent = '登录中...'
      message.innerHTML = ''

      try {
        // 调用云函数
        const res = await wx.cloud.callFunction({
          name: 'adminLogin',
          data: {
            username,
            password
          }
        })

        console.log('登录结果:', res)

        if (res.result.success) {
          message.innerHTML = '<div class="success">登录成功！</div>'
          // 保存登录信息
          localStorage.setItem('admin_token', res.result.data.token)
          localStorage.setItem('admin_info', JSON.stringify(res.result.data))

          // 跳转到管理页面（这里可以改为加载 Vue 应用）
          setTimeout(() => {
            window.location.href = '/admin/dist/index.html'
          }, 1000)
        } else {
          message.innerHTML = '<div class="error">' + res.result.error + '</div>'
        }
      } catch (error) {
        console.error('登录失败:', error)
        message.innerHTML = '<div class="error">登录失败: ' + error.message + '</div>'
      } finally {
        btn.disabled = false
        btn.textContent = '登录'
      }
    })
  </script>
</body>
</html>
